name: Publish to Maven Central

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Publish to Maven Central
        run: |
          # Decode GPG key from base64 and pass as in-memory signing key
          DECODED_KEY=$(echo "$GPG_SIGNING_KEY_B64" | base64 -d)
          ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache \
            -PsigningInMemoryKey="$DECODED_KEY" \
            -PsigningInMemoryKeyId="${{ secrets.GPG_KEY_ID }}" \
            -PsigningInMemoryKeyPassword="" \
            -PmavenCentralUsername="${{ secrets.CENTRAL_USERNAME }}" \
            -PmavenCentralPassword="${{ secrets.CENTRAL_PASSWORD }}"
        env:
          GPG_SIGNING_KEY_B64: ${{ secrets.GPG_SIGNING_KEY_B64 }}

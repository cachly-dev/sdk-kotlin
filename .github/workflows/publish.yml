name: Publish to Maven Central

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Import and trust GPG key
        run: |
          echo "$GPG_SIGNING_KEY_B64" | base64 -d | gpg --batch --import
          # Set trust level to ultimate so gpg can sign without prompting
          FINGERPRINT=$(gpg --list-keys --with-colons hello@cachly.dev | grep '^fpr' | head -1 | cut -d: -f10)
          echo "${FINGERPRINT}:6:" | gpg --import-ownertrust
          echo "use-agent" >> ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpg --list-secret-keys --keyid-format=long
        env:
          GPG_SIGNING_KEY_B64: ${{ secrets.GPG_SIGNING_KEY_B64 }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Publish to Maven Central
        run: |
          ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache \
            -Psigning.gnupg.keyName="${{ secrets.GPG_KEY_ID }}" \
            -PmavenCentralUsername="${{ secrets.CENTRAL_USERNAME }}" \
            -PmavenCentralPassword="${{ secrets.CENTRAL_PASSWORD }}"
        env:
          GPG_TTY: /dev/tty
